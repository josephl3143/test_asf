<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>복무관리 시스템</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --primary:#1A56DB; --primary-dk:#1344B0; --success:#0E9F6E;
      --warning:#F59E0B; --danger:#E02424; --bg:#F3F6FB; --card:#FFFFFF;
      --border:#D1D5DB; --text-main:#111827; --text-sub:#6B7280;
      --radius:14px; --shadow:0 3px 16px rgba(0,0,0,0.07);
    }
    body {
      font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
      background:var(--bg); color:var(--text-main);
      min-height:100vh; padding-bottom:32px;
    }
    header {
      background:linear-gradient(135deg,#1A56DB,#3B82F6);
      color:#fff; padding:18px 20px 20px; text-align:center;
    }
    header h1 { font-size:1.4rem; font-weight:800; }
    .header-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(255,255,255,.18); border-radius:20px;
      padding:3px 12px; font-size:.78rem; margin-top:8px;
    }
    .dot { width:8px; height:8px; border-radius:50%; background:#6EE7B7; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.35)} }

    main { max-width:500px; margin:0 auto; padding:14px; display:flex; flex-direction:column; gap:12px; }

    .card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px; }
    .card-title { font-size:.98rem; font-weight:700; margin-bottom:13px; display:flex; align-items:center; gap:8px; }
    .c-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:.95rem; }
    .ci-blue{background:#EFF6FF} .ci-green{background:#ECFDF5} .ci-purple{background:#F5F3FF} .ci-yellow{background:#FFFBEB}

    .user-row { display:flex; gap:8px; }
    .user-input {
      flex:1; font-size:1.05rem; padding:12px 14px;
      border:2px solid var(--border); border-radius:11px;
      outline:none; transition:border-color .2s; background:#F9FAFB;
    }
    .user-input:focus    { border-color:var(--primary); background:#fff; }
    .user-input:disabled { background:#F3F4F6; color:var(--text-main); cursor:default; }

    .btn {
      cursor:pointer; border:none; border-radius:11px; font-size:.98rem; font-weight:700;
      transition:all .15s; display:flex; align-items:center; justify-content:center; gap:6px;
    }
    .btn:active { transform:scale(.96); }
    .btn-outline { padding:12px 16px; background:#EFF6FF; color:var(--primary); border:2px solid #BFDBFE; }
    .btn-outline:hover { background:#DBEAFE; }
    .btn-primary {
      width:100%; padding:15px; font-size:1.02rem;
      background:var(--primary); color:#fff; border-radius:12px;
      box-shadow:0 3px 12px rgba(26,86,219,.25);
    }
    .btn-primary:hover    { background:var(--primary-dk); }
    .btn-primary:disabled { background:#93C5FD; box-shadow:none; cursor:not-allowed; }
    .btn-success {
      width:100%; padding:16px; font-size:1.05rem;
      background:linear-gradient(135deg,#0E9F6E,#059669);
      color:#fff; border-radius:12px; box-shadow:0 3px 12px rgba(14,159,110,.28);
    }
    .btn-success:hover    { box-shadow:0 5px 16px rgba(14,159,110,.38); }
    .btn-success:disabled { background:#D1FAE5; color:#6EE7B7; box-shadow:none; cursor:not-allowed; }

    .perm-row { display:flex; gap:8px; margin-bottom:12px; }
    .perm-chip {
      flex:1; padding:10px 12px; border-radius:10px;
      display:flex; align-items:center; gap:8px;
      border:2px solid transparent; font-size:.88rem;
    }
    .perm-chip.granted{background:#ECFDF5;border-color:#A7F3D0}
    .perm-chip.denied {background:#FEF2F2;border-color:#FECACA}
    .perm-chip.prompt {background:#FFFBEB;border-color:#FDE68A}
    .perm-chip.pending{background:#F9FAFB;border-color:#E5E7EB}
    .perm-emoji{font-size:1.2rem}
    .perm-label{font-size:.75rem;font-weight:600;color:var(--text-sub)}
    .perm-val  {font-size:.8rem;font-weight:700}
    .perm-chip.granted .perm-val{color:#065F46}
    .perm-chip.denied  .perm-val{color:var(--danger)}
    .perm-chip.prompt  .perm-val{color:#92400E}
    .perm-chip.pending .perm-val{color:var(--text-sub)}
    .perm-alert{font-size:.82rem;padding:10px 13px;border-radius:10px;display:none;margin-top:8px;line-height:1.6}
    .perm-alert.show{display:block}
    .cam-alert{background:#FEF2F2;border:1.5px solid #FECACA;color:#7F1D1D}
    .gps-alert{background:#FFF7ED;border:1.5px solid #FED7AA;color:#7C2D12}
    .btn-perm{width:100%;padding:13px;font-size:.95rem;background:var(--primary);color:#fff;border-radius:11px}
    .btn-perm:hover{background:var(--primary-dk)}
    .btn-perm:disabled{background:#93C5FD;cursor:not-allowed}

    .scan-tabs { display:flex; gap:7px; margin-bottom:14px; }
    .scan-tab {
      flex:1; padding:10px 6px; font-size:.88rem; font-weight:700;
      border-radius:10px; cursor:pointer; border:2px solid var(--border);
      background:#F9FAFB; color:var(--text-sub); text-align:center; transition:all .15s;
    }
    .scan-tab small{display:block;font-size:.68rem;font-weight:500;opacity:.7;margin-top:2px}
    .scan-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}

    /* 사진 촬영 */
    .capture-zone {
      background:#111; border-radius:13px; overflow:hidden;
      min-height:160px; position:relative;
      display:flex; align-items:center; justify-content:center;
    }
    .capture-placeholder{text-align:center;padding:28px 20px;color:#9CA3AF}
    .capture-placeholder .cp-icon{font-size:2.6rem;margin-bottom:8px}
    .capture-placeholder p{font-size:.88rem;line-height:1.6}
    #capturePreview{width:100%;display:none;max-height:280px;object-fit:contain}
    #analyzeOverlay {
      display:none; position:absolute; inset:0;
      background:rgba(0,0,0,.65);
      flex-direction:column; align-items:center; justify-content:center; gap:12px; color:#fff;
      font-size:.95rem; font-weight:600; border-radius:13px;
    }
    #analyzeOverlay.show { display:flex; }
    .analyze-spinner {
      width:40px; height:40px;
      border:4px solid rgba(255,255,255,.3); border-top-color:#fff;
      border-radius:50%; animation:spin .7s linear infinite;
    }
    #fileInput { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }

    /* 실시간 스캔 */
    .qr-wrapper {
      position:relative; width:100%; aspect-ratio:1;
      max-width:340px; margin:0 auto;
      border-radius:14px; overflow:hidden; background:#000;
    }
    #qrVideo { width:100%; height:100%; object-fit:cover; display:block; }
    .qr-overlay {
      position:absolute; inset:0; display:flex;
      align-items:center; justify-content:center; pointer-events:none;
    }
    .qr-frame { width:64%; height:64%; position:relative; }
    .qr-frame::before,.qr-frame::after,.qr-frame>span::before,.qr-frame>span::after {
      content:''; position:absolute; width:24px; height:24px;
      border-color:#fff; border-style:solid;
    }
    .qr-frame::before      { top:0; left:0; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .qr-frame::after       { top:0; right:0; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
    .qr-frame>span::before { bottom:0; left:0; border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
    .qr-frame>span::after  { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
    .scan-line {
      position:absolute; left:18%; width:64%; height:2px;
      background:linear-gradient(90deg,transparent,#3B82F6,transparent);
      animation:scanMove 2s linear infinite;
    }
    @keyframes scanMove { 0%{top:18%} 100%{top:calc(82% - 2px)} }

    #statusBox {
      text-align:center; font-size:.95rem; font-weight:700;
      padding:12px 16px; border-radius:11px; margin-top:10px;
      transition:all .3s; background:#F3F4F6; color:var(--text-sub);
    }
    #statusBox.scanning{background:#EFF6FF;color:var(--primary)}
    #statusBox.success {background:#ECFDF5;color:var(--success)}
    #statusBox.error   {background:#FEF2F2;color:var(--danger)}
    #statusBox.saving  {background:#FFFBEB;color:var(--warning)}

    #qrResult {
      display:none; margin-top:10px; padding:12px 14px;
      background:#F0FDF4; border:1.5px solid #BBF7D0; border-radius:11px;
    }
    .qr-res-row{display:flex;gap:8px;font-size:.88rem;margin-bottom:4px}
    .qr-res-row:last-child{margin-bottom:0}
    .qr-res-label{font-weight:700;color:#065F46;min-width:60px}
    .qr-res-val{color:var(--text-main)}

    .record-list{display:flex;flex-direction:column;gap:9px}
    .record-item {
      display:flex; align-items:center; gap:10px;
      padding:11px 13px; background:#F9FAFB;
      border-radius:11px; border-left:4px solid var(--primary);
    }
    .record-item.gps{border-left-color:var(--success)}
    .r-badge{min-width:36px;height:36px;border-radius:9px;background:#EFF6FF;color:var(--primary);font-size:1rem;display:flex;align-items:center;justify-content:center}
    .r-badge.gps{background:#ECFDF5;color:var(--success)}
    .r-info{flex:1;min-width:0}
    .r-id{font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .r-time{font-size:.75rem;color:var(--text-sub);margin-top:1px}
    .r-type{font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;background:#DBEAFE;color:var(--primary)}
    .r-type.gps{background:#D1FAE5;color:#065F46}
    .empty-msg{text-align:center;padding:20px;color:var(--text-sub);font-size:.88rem}

    #toast {
      position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%) translateY(20px);
      background:#1F2937; color:#fff; padding:12px 20px;
      border-radius:11px; font-size:.92rem; font-weight:600;
      opacity:0; transition:all .3s; z-index:999;
      max-width:88vw; text-align:center; box-shadow:0 4px 16px rgba(0,0,0,.25);
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    .spinner{display:inline-block;width:17px;height:17px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:400px){
      header h1{font-size:1.25rem}
      .card{padding:14px}
    }
  </style>
</head>
<body>

<header>
  <h1>🪖 복무관리 시스템</h1>
  <div class="header-badge">
    <span class="dot"></span>
    <span id="headerUser">사용자 미설정</span>
  </div>
</header>

<main>

  <!-- ① 사용자 이름 -->
  <div class="card">
    <div class="card-title"><div class="c-icon ci-blue">👤</div>사용자 이름</div>
    <div class="user-row">
      <input id="userNameInput" type="text" class="user-input" placeholder="이름을 입력하세요" maxlength="20" disabled />
      <button class="btn btn-outline" id="userEditBtn" onclick="toggleUserEdit()">수정</button>
    </div>
  </div>

  <!-- ② 권한 -->
  <div class="card">
    <div class="card-title"><div class="c-icon ci-yellow">🔒</div>앱 권한</div>
    <div class="perm-row">
      <div class="perm-chip pending" id="permCamera">
        <span class="perm-emoji">📷</span>
        <div><div class="perm-label">카메라</div><div class="perm-val" id="permCamVal">확인 중</div></div>
      </div>
      <div class="perm-chip pending" id="permGps">
        <span class="perm-emoji">📍</span>
        <div><div class="perm-label">위치(GPS)</div><div class="perm-val" id="permGpsVal">확인 중</div></div>
      </div>
    </div>
    <button class="btn btn-perm" id="permBtn" onclick="requestAllPermissions()">🔓 권한 허용하기</button>
    <div class="perm-alert cam-alert" id="camAlert">
      📷 카메라 차단 — 주소창 🔒 → 카메라 → <b>허용</b> 후 새로고침
    </div>
    <div class="perm-alert gps-alert" id="gpsAlert">
      📍 위치 차단 — 주소창 🔒 → 위치 → <b>허용</b> 후 새로고침
    </div>
  </div>

  <!-- ③ QR 스캔 -->
  <div class="card">
    <div class="card-title"><div class="c-icon ci-blue">📷</div>QR 코드 스캔</div>

    <div class="scan-tabs">
      <div class="scan-tab active" id="tabCapture" onclick="switchTab('capture')">
        📸 사진 촬영<small>권장 · 최고 호환</small>
      </div>
      <div class="scan-tab" id="tabLive" onclick="switchTab('live')">
        🎥 실시간 스캔<small>GitHub 배포 시 사용</small>
      </div>
    </div>

    <!-- 사진 촬영 -->
    <div id="panelCapture">
      <div class="capture-zone">
        <input type="file" id="fileInput" accept="image/*" onchange="onFileSelected(event)" />
        <div class="capture-placeholder" id="capturePlaceholder">
          <div class="cp-icon">📷</div>
          <p>아래 버튼으로 QR 촬영<br><small style="color:#6B7280">촬영하면 자동 인식됩니다</small></p>
        </div>
        <img id="capturePreview" alt="미리보기" />
        <div id="analyzeOverlay"><div class="analyze-spinner"></div><span>QR 분석 중...</span></div>
      </div>
      <canvas id="captureCanvas" style="display:none;"></canvas>
      <button class="btn btn-primary" style="margin-top:10px;" onclick="triggerCapture()">
        📸 카메라로 QR 촬영하기
      </button>
    </div>

    <!-- 실시간 스캔 -->
    <div id="panelLive" style="display:none;">
      <div class="qr-wrapper">
        <video id="qrVideo" autoplay muted playsinline></video>
        <div class="qr-overlay"><div class="qr-frame"><span></span></div></div>
        <div class="scan-line"></div>
      </div>
      <canvas id="liveCanvas" style="display:none;"></canvas>
      <button class="btn btn-primary" id="liveStartBtn" style="margin-top:10px;" onclick="startLiveCamera()">
        🎥 실시간 스캔 시작
      </button>
    </div>

    <div id="statusBox">대기 중...</div>
    <div id="qrResult">
      <div class="qr-res-row"><span class="qr-res-label">관리번호</span><span class="qr-res-val" id="resCnum">-</span></div>
      <div class="qr-res-row"><span class="qr-res-label">위치</span><span class="qr-res-val" id="resAddress">-</span></div>
    </div>
  </div>

  <!-- ④ 위치 기록 -->
  <div class="card">
    <div class="card-title"><div class="c-icon ci-green">📍</div>위치 기록 (QR 없을 때)</div>
    <button class="btn btn-success" id="locationBtn" onclick="recordLocation()">📍 현재 위치 기록하기</button>
  </div>

  <!-- ⑤ 최근 기록 -->
  <div class="card">
    <div class="card-title">
      <div class="c-icon ci-purple">📋</div>최근 기록
      <button onclick="loadRecentRecords()"
        style="margin-left:auto;font-size:.78rem;background:#F3F4F6;border:none;
               border-radius:8px;padding:5px 10px;cursor:pointer;color:var(--text-sub);font-weight:700;">
        🔄 새로고침
      </button>
    </div>
    <div class="record-list" id="recordList"><div class="empty-msg">📭 기록이 없습니다</div></div>
  </div>

</main>
<div id="toast"></div>

<script>
// ============================================================
//  ★ API 엔드포인트 설정
//  배포 후 Apps Script 웹앱 URL로 변경하세요
// ============================================================
const API_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxeO3figPSZ0rwLON1BxtB9kpeL2CrrUSnTPnegVbL-5x2_bJHsRW5TYJLO0fyqNes/exec';
// 예: 'https://script.google.com/macros/s/XXXXXXXXXX/exec'

// ============================================================
//  data.json 데이터
// ============================================================
const DATA_JSON = {
  items: [
    { id:"10100", cnum:"경북-0674", address:"경상북도 영주시 문정동 산 14-13" },
    { id:"2", cnum:"강원-0002", address:"강원특별자치도 철원군 동송읍 이평리 산 173" },
    { id:"3", cnum:"강원-0003", address:"강원특별자치도 철원군 동송읍 이평리 산 161-2" },
    { id:"4", cnum:"강원-0004", address:"강원특별자치도 철원군 동송읍 오지리 산 58-10" }
  ]
};

function resolveQRData(rawData) {
  if (rawData.includes('|') && !rawData.startsWith('http')) {
    const p = rawData.split('|');
    return { locationId: p[0].trim(), locationName: (p[1]||'').trim(), found:true };
  }
  try {
    const url = new URL(rawData);
    const num = url.searchParams.get('num');
    if (num) {
      const item = DATA_JSON.items.find(i => i.id === num);
      if (item) return { locationId: item.cnum, locationName: item.address, found:true };
      return { locationId:'ID:'+num, locationName:'(데이터 없음)', found:false };
    }
    const id  = url.searchParams.get('id')  || '';
    const loc = url.searchParams.get('loc') || '';
    if (id||loc) return { locationId:id, locationName:loc, found:true };
    return { locationId:rawData, locationName:'', found:false };
  } catch {
    return { locationId:rawData, locationName:'', found:false };
  }
}

// ============================================================
//  QR 다중 해상도 분석
// ============================================================
function analyzeImageForQR(imgElement) {
  const canvas = document.getElementById('captureCanvas');
  const ctx = canvas.getContext('2d');
  const sizes = [600, 800, 1000, 1200, imgElement.naturalWidth];

  for (const size of sizes) {
    const scale = Math.min(size / imgElement.naturalWidth, 1);
    const w = Math.round(imgElement.naturalWidth * scale);
    const h = Math.round(imgElement.naturalHeight * scale);
    canvas.width = w; canvas.height = h;
    ctx.drawImage(imgElement, 0, 0, w, h);
    const imageData = ctx.getImageData(0, 0, w, h);
    let code = jsQR(imageData.data, w, h, { inversionAttempts:'dontInvert' });
    if (!code) code = jsQR(imageData.data, w, h, { inversionAttempts:'onlyInvert' });
    if (code) return code.data;
  }
  return null;
}

// ============================================================
//  전역 상태
// ============================================================
let liveScanning = false;
let liveStream = null;
let lastQRData = '';
let lastQRTime = 0;
const QR_COOLDOWN = 3000;

// ============================================================
//  초기화
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  loadUser();
  checkPermissions();
  loadRecentRecords();
  document.getElementById('userNameInput').addEventListener('keydown', e => {
    if(e.key==='Enter') toggleUserEdit();
  });

  // API 엔드포인트 체크
  if (API_ENDPOINT === 'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE') {
    showToast('⚠️ API_ENDPOINT를 설정해주세요 (JS 상단)', 5000);
  }
});

// ============================================================
//  사용자명
// ============================================================
function loadUser() {
  const saved = localStorage.getItem('dutyCare_userName') || '';
  const input = document.getElementById('userNameInput');
  if (saved) { input.value=saved; updateHeaderUser(saved); }
  else { input.disabled=false; input.focus(); document.getElementById('userEditBtn').textContent='저장'; }
}
function toggleUserEdit() {
  const input = document.getElementById('userNameInput');
  const btn = document.getElementById('userEditBtn');
  if (input.disabled) { input.disabled=false; input.focus(); btn.textContent='저장'; }
  else {
    const name = input.value.trim();
    if (!name) { showToast('⚠️ 이름을 입력해주세요'); input.focus(); return; }
    localStorage.setItem('dutyCare_userName', name);
    input.disabled=true; btn.textContent='수정';
    updateHeaderUser(name); showToast('✅ 이름 저장됨');
  }
}
function updateHeaderUser(n) { document.getElementById('headerUser').textContent = n+' 님'; }
function getUserName() { return localStorage.getItem('dutyCare_userName')||''; }

// ============================================================
//  권한
// ============================================================
async function checkPermissions() {
  try {
    const p = await navigator.permissions.query({name:'camera'});
    setPermUI('Camera', p.state);
    p.addEventListener('change', ()=>setPermUI('Camera', p.state));
  } catch { setPermUI('Camera','unknown'); }
  try {
    const p = await navigator.permissions.query({name:'geolocation'});
    setPermUI('Gps', p.state);
    p.addEventListener('change', ()=>setPermUI('Gps', p.state));
  } catch { setPermUI('Gps','unknown'); }
}
function setPermUI(type, state) {
  const box = document.getElementById('perm'+type);
  const val = document.getElementById('perm'+(type==='Camera'?'Cam':'Gps')+'Val');
  box.className='perm-chip '+({granted:'granted',denied:'denied',prompt:'prompt'}[state]||'pending');
  val.textContent={granted:'✅ 허용',denied:'❌ 차단',prompt:'⚠️ 미설정',unknown:'❓'}[state]||'확인 중';
  if(type==='Camera') document.getElementById('camAlert').classList.toggle('show', state==='denied');
  else document.getElementById('gpsAlert').classList.toggle('show', state==='denied');
  const ok = document.getElementById('permCamera').classList.contains('granted') &&
             document.getElementById('permGps').classList.contains('granted');
  document.getElementById('permBtn').style.display = ok?'none':'flex';
}
async function requestAllPermissions() {
  const btn=document.getElementById('permBtn');
  btn.innerHTML='<span class="spinner"></span> 요청 중...'; btn.disabled=true;
  try {
    const s = await navigator.mediaDevices.getUserMedia({video:true});
    s.getTracks().forEach(t=>t.stop());
    setPermUI('Camera','granted'); showToast('📷 카메라 허용됨');
  } catch(e) { setPermUI('Camera', e.name==='NotAllowedError'?'denied':'prompt'); }
  try {
    await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000}));
    setPermUI('Gps','granted'); showToast('📍 위치 허용됨');
  } catch(e) { setPermUI('Gps', e.code===1?'denied':'prompt'); }
  btn.innerHTML='🔓 권한 허용하기'; btn.disabled=false;
}

// ============================================================
//  탭 전환
// ============================================================
function switchTab(tab) {
  const isCapture = tab==='capture';
  document.getElementById('tabCapture').classList.toggle('active', isCapture);
  document.getElementById('tabLive').classList.toggle('active', !isCapture);
  document.getElementById('panelCapture').style.display = isCapture?'block':'none';
  document.getElementById('panelLive').style.display = isCapture?'none':'block';
  if (isCapture && liveScanning) stopLiveCamera();
  setStatus('','대기 중...');
  document.getElementById('qrResult').style.display='none';
}

// ============================================================
//  사진 촬영
// ============================================================
function triggerCapture() {
  if (!checkUser()) return;
  const fi = document.getElementById('fileInput');
  fi.setAttribute('capture','environment');
  fi.click();
}
function onFileSelected(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  document.getElementById('analyzeOverlay').classList.add('show');
  setStatus('saving','🔍 QR 분석 중...');

  const reader = new FileReader();
  reader.onload = evt => {
    const img = new Image();
    img.onload = () => {
      const preview = document.getElementById('capturePreview');
      preview.src = evt.target.result;
      preview.style.display = 'block';
      document.getElementById('capturePlaceholder').style.display = 'none';

      const qrData = analyzeImageForQR(img);
      document.getElementById('analyzeOverlay').classList.remove('show');

      if (qrData) {
        setStatus('saving','✅ QR 인식! 저장 중...');
        handleQRResult(qrData);
      } else {
        setStatus('error','❌ QR 인식 실패 — 다시 촬영해주세요');
        showToast('❌ QR 인식 실패\n더 가깝게, 흔들림 없이 촬영해주세요');
      }
      e.target.value = '';
    };
    img.onerror = () => {
      document.getElementById('analyzeOverlay').classList.remove('show');
      setStatus('error','❌ 이미지 로드 실패');
    };
    img.src = evt.target.result;
  };
  reader.readAsDataURL(file);
}

// ============================================================
//  실시간 스캔 (GitHub Pages에서만 정상 작동)
// ============================================================
async function startLiveCamera() {
  if (!checkUser()) return;
  const btn = document.getElementById('liveStartBtn');
  btn.innerHTML = '<span class="spinner"></span> 준비 중...'; btn.disabled = true;

  try {
    liveStream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
    });
    setPermUI('Camera','granted');
    const video = document.getElementById('qrVideo');
    video.srcObject = liveStream;
    await video.play();
    liveScanning = true;
    btn.style.display = 'none';
    setStatus('scanning','📷 QR 코드 인식 중...');
    requestAnimationFrame(liveLoop);
  } catch(err) {
    console.error(err);
    setPermUI('Camera','denied');
    btn.innerHTML = '🎥 실시간 스캔 시작'; btn.disabled = false;
    setStatus('error','❌ 카메라 실패 — 사진 촬영 탭을 이용하세요');
    showToast('❌ 실시간 카메라 실패 → GitHub Pages 배포 후 사용 가능');
    setTimeout(() => switchTab('capture'), 1800);
  }
}
function liveLoop() {
  if (!liveScanning) return;
  const video = document.getElementById('qrVideo');
  const canvas = document.getElementById('liveCanvas');
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const code = jsQR(
      ctx.getImageData(0,0,canvas.width,canvas.height).data,
      canvas.width, canvas.height, { inversionAttempts:'dontInvert' }
    );
    if (code) {
      const now = Date.now();
      if (code.data !== lastQRData || now - lastQRTime > QR_COOLDOWN) {
        lastQRData = code.data; lastQRTime = now;
        handleQRResult(code.data);
      }
    }
  }
  requestAnimationFrame(liveLoop);
}
function stopLiveCamera() {
  liveScanning = false;
  if (liveStream) { liveStream.getTracks().forEach(t=>t.stop()); liveStream=null; }
  const btn = document.getElementById('liveStartBtn');
  btn.style.display='flex'; btn.innerHTML='🎥 실시간 스캔 시작'; btn.disabled=false;
}

// ============================================================
//  QR 결과 처리
// ============================================================
function handleQRResult(rawData) {
  const { locationId, locationName, found } = resolveQRData(rawData);
  document.getElementById('resCnum').textContent = locationId || '-';
  document.getElementById('resAddress').textContent = locationName || '-';
  document.getElementById('qrResult').style.display = 'block';
  if (!found) showToast('⚠️ data.json 미등록 QR');
  saveToSheet({ recordType:'QR스캔', locationId, locationName, lat:'', lng:'', memo:'' });
}

// ============================================================
//  위치 기록
// ============================================================
function recordLocation() {
  if (!checkUser()) return;
  const btn = document.getElementById('locationBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> 위치 확인 중...';
  if (!navigator.geolocation) {
    showToast('❌ GPS 미지원 기기'); resetLocationBtn(); return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      setPermUI('Gps','granted');
      saveToSheet({ recordType:'GPS기록', locationId:'', locationName:'',
        lat:pos.coords.latitude.toFixed(6), lng:pos.coords.longitude.toFixed(6), memo:'' });
    },
    err => {
      setPermUI('Gps', err.code===1?'denied':'prompt');
      showToast(err.code===1?'❌ 위치 권한 차단됨':'❌ 위치를 가져올 수 없음');
      resetLocationBtn();
    },
    {enableHighAccuracy:true, timeout:10000}
  );
}
function resetLocationBtn() {
  const btn=document.getElementById('locationBtn');
  btn.disabled=false; btn.innerHTML='📍 현재 위치 기록하기';
}

// ============================================================
//  시트 저장 — API 호출 방식
// ============================================================
function saveToSheet(fields) {
  const payload = Object.assign({userName:getUserName()}, fields);
  
  const url = `${API_ENDPOINT}?api=1&action=saveRecord&data=${encodeURIComponent(JSON.stringify(payload))}`;
  
  fetch(url)
    .then(res => res.json())
    .then(data => onSaveSuccess(data, fields.recordType))
    .catch(err => onSaveError(err));
}
function onSaveSuccess(res, type) {
  if (res.success) {
    setStatus('success',`✅ 저장 완료 (연번: ${res.rowNo})`);
    showToast(`✅ ${type} 저장됨`);
    loadRecentRecords();
  } else {
    setStatus('error','❌ 저장 실패: '+res.message);
    showToast('❌ '+res.message);
  }
  resetLocationBtn();
  setTimeout(()=>setStatus(liveScanning?'scanning':'', liveScanning?'📷 QR 코드 인식 중...':'대기 중...'), 3000);
}
function onSaveError(err) {
  setStatus('error','❌ 서버 오류');
  showToast('❌ '+err.message);
  resetLocationBtn();
}

// ============================================================
//  최근 기록 — API 호출 방식
// ============================================================
function loadRecentRecords() {
  const url = `${API_ENDPOINT}?api=1&action=getRecentRecords&userName=${encodeURIComponent(getUserName())}&limit=3`;
  
  fetch(url)
    .then(res => res.json())
    .then(data => renderRecords(data))
    .catch(e => console.error(e));
}
function renderRecords(records) {
  const list=document.getElementById('recordList');
  if (!records||records.length===0) {
    list.innerHTML='<div class="empty-msg">📭 기록이 없습니다</div>'; return;
  }
  list.innerHTML=records.map(r=>{
    const isGps=r.recordType==='GPS기록';
    const title=r.locationId
      ?`${r.locationId}${r.locationName?' · '+r.locationName:''}`
      :r.lat?`GPS (${r.lat}, ${r.lng})`:'기록됨';
    return `<div class="record-item ${isGps?'gps':''}">
      <div class="r-badge ${isGps?'gps':''}">${isGps?'📍':'📷'}</div>
      <div class="r-info">
        <div class="r-id">${esc(title)}</div>
        <div class="r-time">⏰ ${esc(String(r.timestamp))}</div>
      </div>
      <span class="r-type ${isGps?'gps':''}">${r.recordType}</span>
    </div>`;
  }).join('');
}

// ============================================================
//  유틸
// ============================================================
function checkUser() {
  if (!getUserName()) {
    showToast('⚠️ 이름을 먼저 입력해주세요');
    document.getElementById('userNameInput').disabled=false;
    document.getElementById('userNameInput').focus();
    document.getElementById('userEditBtn').textContent='저장';
    return false;
  }
  return true;
}
function setStatus(cls,msg) {
  const b=document.getElementById('statusBox'); b.className=cls; b.textContent=msg;
}
let _tt=null;
function showToast(msg,dur=2800) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),dur);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
